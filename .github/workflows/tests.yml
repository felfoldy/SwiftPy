name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme SwiftPy \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Export coverage (lcov)
        run: |
          PROFDATA=$(find DerivedData -name '*.profdata' | head -1)
          BIN="$(find DerivedData/Build/Products -name 'SwiftPyTests.xctest' | head -1)/Contents/MacOS/SwiftPyTests"
          xcrun llvm-cov export -format=lcov \
            -instr-profile "$PROFDATA" "$BIN" \
            -ignore-filename-regex='(Tests|DerivedData|\.build|checkouts|pocketpy)/' \
            > coverage.lcov
          echo "lcov lines: $(wc -l < coverage.lcov)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
